# Machine-specific data for templates
# https://www.chezmoi.io/reference/templates/chezmoi-data/

# User information - One source of truth
name: "Rudimar Ronsoni"
email: "rudimar@outlook.com"

# Shell preference
shell: "zsh"
shell_alt: "bash"

# 1Password secrets configuration
# Change these paths to match your vault structure
secrets:
  service_account_token:
    vault: "vault-prd"
    item: "1password docker-proxmox Service Account Auth Token"
    field: "credential"
  github_mcp_token:
    vault: "vault-prd"
    item: "GitHub MCP Token"
    field: "credential"
  synthetic_api_key:
    vault: "vault-prd"
    item: "Synthetic API Key"
    field: "credential"

# Package definitions (merged from packages.yaml)
packages:
  darwin:
    brews:
      - chezmoi
      - git
      - curl
      - wget
      - zsh
      - bash
      - vim
      - oh-my-posh
      - tmux
      - fzf
      - ripgrep
      - fd
      - bat
      - eza
      - btop
      - gh
      - lazygit
      - jq
      - k3d
      - k9s
      - mise
      - skaffold
      - docker
      - docker-compose
      - kubectl
      - helm
      - just
      - poetry
      - ngrok
      - ollama
    casks: []
  linux:
    common:
      - git
      - curl
      - wget
      - zsh
      - bash
      - vim
      - tmux
      - fzf
      - btop
    apt:
      - ripgrep
      - fd-find
      - bat
      - eza
      - gh
      - jq
      - skaffold
      - docker.io
      - docker-compose
      - kubectl
      - helm
      - ngrok
      - python3-poetry
    dnf:
      - ripgrep
      - fd-find
      - bat
      - eza
      - gh
      - lazygit
      - ngrok
      - poetry
    pacman:
      - ripgrep
      - fd
      - bat
      - eza
      - github-cli
      - lazygit
      - ngrok
      - poetry
    zypper:
      - ripgrep
      - fd
      - bat
      - eza
      - ngrok
      - poetry
  windows:
    winget:
      - { id: twpayne.chezmoi, name: Chezmoi }
      - { id: Git.Git, name: Git }
      - { id: Microsoft.WindowsTerminal, name: Windows Terminal }
      - { id: JanDeDobbeleer.OhMyPosh, name: Oh My Posh }
      - { id: fzf, name: fzf }
      - { id: BurntSushi.ripgrep.MSVC, name: ripgrep }
      - { id: sharkdp.fd, name: fd }
      - { id: sharkdp.bat, name: bat }
      - { id: eza-community.eza, name: eza }
      - { id: GitHub.cli, name: GitHub CLI }
      - { id: JesseDuffield.lazygit, name: lazygit }
    scoop:
      - btop
