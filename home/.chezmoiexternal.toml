# External Dependencies for chezmoi
# https://www.chezmoi.io/reference/special-files/chezmoiexternal/
#
# These repositories are cloned/managed by chezmoi, not committed to the dotfiles repo.
# Run `chezmoi apply` to update them.

# ============================================================================
# TPM-Redux (Tmux Plugin Manager - Fork with improvements)
# https://github.com/RyanMacG/tpm-redux
# ============================================================================
[".config/tmux/plugins/tpm-redux"]
    type = "git-repo"
    url = "https://github.com/RyanMacG/tpm-redux"
    refreshPeriod = "168h"  # Refresh weekly

# ============================================================================
# Tmux Plugins
# ============================================================================

# Sensible defaults for tmux
[".config/tmux/plugins/tmux-sensible"]
    type = "git-repo"
    url = "https://github.com/tmux-plugins/tmux-sensible"
    refreshPeriod = "168h"

# Yank to system clipboard
[".config/tmux/plugins/tmux-yank"]
    type = "git-repo"
    url = "https://github.com/tmux-plugins/tmux-yank"
    refreshPeriod = "168h"

# Interactive menus for tmux
[".config/tmux/plugins/tmux-menus"]
    type = "git-repo"
    url = "https://github.com/jaclu/tmux-menus"
    refreshPeriod = "168h"

# Tmux logging
[".config/tmux/plugins/tmux-logging"]
    type = "git-repo"
    url = "https://github.com/tmux-plugins/tmux-logging"
    refreshPeriod = "168h"

# Resurrect - save and restore tmux sessions
[".config/tmux/plugins/tmux-resurrect"]
    type = "git-repo"
    url = "https://github.com/tmux-plugins/tmux-resurrect"
    refreshPeriod = "168h"

# Continuum - automatic saving and startup
[".config/tmux/plugins/tmux-continuum"]
    type = "git-repo"
    url = "https://github.com/tmux-plugins/tmux-continuum"
    refreshPeriod = "168h"

